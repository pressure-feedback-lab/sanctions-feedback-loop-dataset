b_index:
  label: "Survival Gradient Index"
  definition: >
    Composite measure of external pressure intensity.
    High values correlate with consolidation of external threat narratives
    and short-term regime stability.
  range: "0-9"
  components:
    - sanction_intensity
    - military_pressure
    - external_threat_narrative
  nonlinear_note: >
    In this dataset, higher values correlate with reduced protest frequency,
    contradicting linear destabilization assumptions.
  nonlinear_signal: >
    Contrary to conventional linear destabilization assumptions,
    higher B-index values correlate with reduced protest frequency
    and short-term regime stabilization in this dataset.
r_fracture:
  label: "Framework Fracture Index"
  definition: >
    Net elite cohesion measure.
    Positive values indicate necessary conditions for transition.
  range: "-3 to +3"
  transition_condition: ">=1 when b_index <=4"
  nonlinear_role: >
    Positive values are necessary but not sufficient for transition.
    Negative or zero values predict regime persistence regardless of economic stress.
